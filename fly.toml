app = "scene-wiki-runner"
primary_region = "ord"
kill_signal = "SIGINT"
kill_timeout = "5m"

[build]
  dockerfile = "Dockerfile.runner"

[env]
  PLATFORM_BASE_URL = "https://scene-wiki-platform.founders-0e1.workers.dev"
  MAIN_DOMAIN = "scenewiki.net"
  PAGES_PROJECT_PREFIX = "scene-wiki"
  RUNNER_POLL_SECONDS = "20"
  SCENE_WIKI_EXTRACTION_BACKEND = "openai"
  SCENE_WIKI_ROOT = "/app"
  RUNNER_WORKDIR = "/app"

[processes]
  app = "python3 scripts/platform_runner.py --env-file /app/.missing-env --workdir /app"

[[vm]]
  cpus = 1
  memory = "2gb"
  cpu_kind = "shared"
